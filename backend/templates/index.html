{% extends 'base.html' %}

{% block title %}Tassel{% endblock %}

{% block body %}
<main class="page-shell">
  <section class="hero" aria-label="Tassel landing page">
    <div class="hero__brand">
      <div class="hero__logo-wrap" aria-hidden="true">
        <img
          class="hero__logo"
          src="{{ url_for('static', filename='tassel_logo_nobg.png') }}"
          alt="Tassel logo"
        />
      </div>
      <h1 class="hero__name">Tassel</h1>
    </div>
    <p class="hero__tagline">Pay back your student loans on every purchase and task</p>
  </section>
</main>
{% endblock %}
